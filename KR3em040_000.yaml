body:
  text: 治法凡治口疳必先以壓舌壓定其舌以杖子挑起上齶務細觀其咽喉中有無次及上下齶舌底齒根如有紫腫處用三稜針刺出毒血或有黃泡爛肉以青生絹裹指蘸新汲井花水拭擦去淨用二聖散干敷患處以消毒散生蜜調與食後服若疳延於上齶用緑袍散敷之毒涎從其流出或咽下亦不妨或用聖餅子貼於足心男左女右以帛扎定如延及咽喉用藥筒納紫金散吹入治以甘露飲煎食後倘有黑爛惡肉攻成潭穴者為至重之症須以刀取去惡肉但不知疼痛者不可治矣若覺痛速以紫金散敷之以甘露飲加皺面還丹濃煎與服庶幾得生凡發痘疹生疳敷治並同上法但以胡荽煎湯停溫代前井化水用凡治耳𦝞內生疳必先以綿杖子三五枚或七九枚十一十三枚務令搌其耳內膿水乾淨然後以鵝毛管納藥吹入待乾為愈凡治胎毒頭疳膿血滿頭腥臭滋水淋漓或痛或癢延及肢體者先以米泔水煎二妙丹去渣令溫洗之無風處拭乾再用鹿兒膏加茅君散香油調勻敷之內服肥兒丸乳母忌食辛熱發毒之物如鼻疳用蘭香散干敷凡治頭面手足遍身疳瘡先用米泔湯洗之再以豬油調十仙丹敷上若癢加二妙丹痛不必加內服肥兒消疳丸均可忌一切發毒辛熱之物凡治大人遍體生疳或疥癬肥瘡亦用十仙丹加二黃散豬油調敷忌食諸般發毒動風辛熱之物凡治下疳之法須審內發外染二種內發者自父母稟體所遺根柢甚深外染者衣服不潔傳染而得病尚膚淺用二妙丹以絹包之入濃米泔中煎數沸去渣停溫勿添生水於避風處淨拭乾滋水用冰黃散干敷以香油調敷忌口如前列諸般發毒動風辛熱之物凡治五疳之法須辨新久冷熱若疳之新者為熱疳則面黃瞼赤骨熱盜汗鼻乾口臭唇焦煩渴心躁驚悸情意不樂若疳之久者為冷疳則目腫腹脹便利不定瀉糞肥膩或似油珠煩渴黃瘦熱疳病多在外冷疳病多在內又有冷熱二症交互非新非久不內外因者然初病肥熱久病瘦冷小兒易為虛實脾虛不任寒溫服寒藥則生冷服溫藥則生熱當識此理以為治療之綱領消積和胃滋血調氣隨宜用藥以扶之淡薄飲食以養之久久自然充實疳之為病名狀固多而治療之方亦不少惟消疳丸保童丸二方治五疳品味平和用之穩當量兒大小新久冷熱虛實以意消息增損與服得效如神是用表而出之凡藥品異名皆出於胡氏圖經本草陶氏本草衍義進士侯君藥譜中所採而用之者決非杜撰胡為耳後之用是方者尚當稽索則亦自有進益之處焉藥方紫金散治遍口生疳作穢臭爛延及咽喉敗壞甚速故名曰走馬疳明羽澤即明礬煅三錢溺中垽即人中白煅二錢百蟲倉即五倍子煅五錢赤鉛華即東丹炒紫色一錢玉虛飰即冰片一分水銀臘即輕粉三分詩曰赤鉛華在明羽澤溺中垽合水銀臘百蟲倉有玉虛飰治走馬急疳第一方上以前四味各等精製並研羅過加後二味少許再研勻極細末用緑袍散治症同前山屠粉即黃柏末藍寶華即青黛羽石圼灰即枯礬玉虛飰即冰片詩曰山屠粉和玉虛飰藍寶華同羽澤灰善治急疳名走馬緑袍散是藥之魁上以前三味各研細末和成柳葉色然後加入後一味少許再研勻用二聖散治症同前黃山屠即黃柏白羽石圼即白礬煅存性詩曰黃口生疳何用醫速求二聖散無疑黃山屠和白羽石圼為末頻頻干敷之上二味等分為極細末用立效散治𦝞內生疳腫脹膿血臭穢羽石圼灰即枯礬片胚子即干胭脂拔萃團即麝香詩曰立效散治耳𦝞疳羽澤灰成拔萃團更加一味片胚子為末吹之即便安上二味等分研細後加下一味少許研勻用鹿兒膏治胎毒頭疳膿血滿頭腥臭滋水淋漓延及肢體或痛或癢赤鉛華即黃丹水飛四兩琥珀絲即松香研細八兩詩曰頭疳紅藥鹿兒膏四兩赤鉛華水淘飛過炒如霞紫色八兩琥珀絲共熬蔥齏汁內煎數沸重研極細末為高更加一分茅君散香油和拌要勻調上二味制度研細貯蔥管內入於齏汁中煮數沸去蔥取藥再研細加茅君散四兩水銀臘一錢和勻用其茅君散蒼朮也茅君散治濕毒疳瘡偷蜜珊瑚即甘草三兩赤伯淡即厚朴三兩茅君寶筵即蒼朮五兩陳貴老即陳皮三兩詩曰鹿兒膏內茅君散茅君寶篋五兩羅偷蜜珊瑚赤伯淡陳貴老加三兩和上磨極細末用十仙丹治頭面手足偏身疳瘡靜風尾即荊芥一斤黃子伯即黃柏一斤琥珀絲即松香一斤白藥須即煎草一斤鎖眉根即苦參一斤蛇兒米即蛇床子一斤兩平章即獨話一斤若梓皮即海桐皮半斤白羽石圼即白礬半斤風兒肉即大風子肉四兩詩曰琥珀絲有靜風尾兩平章運蛇兒米黃子伯生白藥須鎖眉根要均勻爾白羽石圼上若梓皮減半分兩磨羅起風兒肉比又減半調理疳生周遍體米泔湯洗豬油調癢加二妙疼還去若增二黃更有治大人疥癬瘡無此上磨羅為極細末用二妙丹治癢殺蟲去濕銅華精即銅青枯羽澤即枯礬上二味研等分為極細末用二黃散治癢殺蟲去毒小兒藥中勿用崑崙黃即硫黃一兩黃食石即雄黃三錢上研為細末加入十仙丹內每貼一匕詩曰二妙丹中何為妙銅華精枯羽澤良二黃散內有二味黃食石佐崑崙黃冰黃散治下疳蘆公石即蘆甘石玉虛飰即冰片水銀臘即輕粉珠子香即乳香孩子茗即孩兒茶麒麟血即血竭蠻龍古血即沒藥詩曰蘆公石煮玉虛飰孩子茗煮珠子香水銀臘和麒麟血更入蠻龍古血良上各等分研為極細末用消毒散治濕毒口疳太清尊者即朴硝一兩冰喉尉即薄荷二兩半黃香影子即山梔一兩七錢苦督郵即黃芩一兩半偷蜜珊瑚即甘草四兩五錢無聲虎即大黃一兩三錢度厄錢即連翹三兩詩曰太清尊者冰喉尉偷蜜珊瑚苦督郵黃香影子無聲虎度厄錢因消毒酬上各制過磨羅如數稱併為細末用甘露飲治症如上洞庭奴隸即枳殼去白麵炒林蘭即石斛去蘆蘆橘葉即枇杷葉去毛顛勒即天冬去心焙國老即甘草羊韭即麥冬去心腐賜即黃芩茵陳熟芭即熟地詩曰顛勒生地出洞庭腐賜熟芭要茵陳林蘭國老生蘆橘羊韭和成甘露春上㕮咀每服三錢水一盞煎七分食後溫服消疳丸治疳生於內面黃腹脹潮熱便濁腹疼及蟲痛羸瘦黑金屑即鐵屑一兩苦酒炒茅君散即平胃二兩詩曰磨積消疳丸妙絶苦酒炒乾黑金屑茅君散和醋糊丸空心米飲服為捷上以苦酒拌黑金屑炒乾入茅君散和勻用醋糊丸空心米飲服保童丸治五疳風梭御史即使君子炒黑色散雪玉塵即麵炒黑色詩曰五疳保童治五疳風稜御史玉塵兼二味各炒令黑色米飲送下面糊丸上為末麵糊為丸空心米飲下肥兒丸治疳瘦進飲食健脾胃殺蟲清積化米先生即神麯炒一兩一錢綬米帶即麥芽六錢風梭御史即使君子淨五錢滴膽芝即黃連一兩二錢脾家瑞氣即檳榔二錢五分大通緑即木香二錢五分詩曰化米先生綬米帶風梭御史滴膽芝脾家瑞氣大通緑洗瘴丹能肥小兒上為細末麵糊為丸黍米大空心米湯下聖餅子治走馬急疳用此能拔毒抱靈居士即香附去毛痰宮霹靂即半夏詩曰聖餅抱靈居士耳痰宮霹靂兩均研雞子清調和作餅男左女右足心淹上二味等分為末以雞子清調和成餅男左女右貼於足心干則易之蘭香散治鼻疳爛銅華精即銅青五分蘭香葉二錢水銀臘即經粉二分詩曰蘭香散用蘭香葉水銀臘與銅華精能治鼻疳瘡作爛為末干敷一掃平上為細末看瘡大小干貼之藥品異名括大清尊者朴硝爾偷蜜珊瑚甘草名脾家瑞氣內豆蔻抱靈居士香附更羽石圼羽澤皆礬石銅華精即是銅青干胭脂做片胚子苦督郵只為黃芩痰宮霹靂當半夏大通緑染木香形蠻龍古血沒藥也鎖眉根號曰苦參茅君寶篋蒼朮鮮連翹便是度厄錢顛勒羊韭天麥冬熟地生地為芭苄黃香影子山梔子赤鉛華煉作黃丹雄黃異名黃食石麝香和作拔萃團溺中垽號人中白金叉石斛成林蘭百蟲倉即五倍子松脂化作琥珀絲獨活號稱兩平章珠子香焚即乳香風兒肉喚大風子崑崙黃配作硫黃陳皮久曰陳貴老無聲虎畏伏大黃洞庭奴隸為枳殼甘草又名國老當黃芩亦可為腐賜黑金屑即鐵屑稱風稜御史使君子黑麵是散雪玉塵綬米帶乃麥芽號神麯乃化米先生滴膽芝即是黃連諸般藥品多異名
