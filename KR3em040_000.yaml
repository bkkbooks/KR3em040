front:
  text: 序吾滕氏自唐迄今六百餘年科第聯芳箸纓相繼詩禮傳家清明持守至大父舉應賢良方正能言極諫科不仕蒙賜號廉靜處士吾父國學進士亦應是科年一十六而奄棄獨遺不肖早孤失學無聞唯謹是持而唯善是務耳寶慶改元吾時年二十八仲春具牲醴詣墓拜掃封塋途遇一老叟貌古而奇氣舒而泰風度飄飄精神落落顧吾若欲與語者以是趨進長揖叟執吾手笑而謂曰子善人子也何少讀書耶今雖不得貴亦當致子富也吾卒然感而思之富貴果人心之所愛者然吾向乏嗣不若以此為請於叟乎於是敬上白焉叟曰子既不以富貴為欲而以子嗣為欲宜乎吾當以子壽繼而出受一書囑曰願子將此多濟人子嗣則子子嗣必多矣使吾向日拜起而叟遂失焉駭感良久謹捧書歸焚香開讀乃治小兒急疳走馬真方也按方精修合施於人果甚奇驗百發百中未幾生圭長仕吳江州司訓圭生清逮今吾年八十餘矣噫叟之言神且信也其書敢不敬乎烏可易而視之哉是用識於篇首示吾子孫當保是書而精修藥餌惟以濟人為心不以利為心可也德佑元年歲次乙亥孟夏吉日樂善老人南陽滕伯祥撰
  hash: sha256:3f1da17a51d19e16259924f58948913a44179ee9d0b378b56b647a2af30bf0ab
